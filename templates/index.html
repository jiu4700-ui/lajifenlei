<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>垃圾分类系统</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        /* 提前写入首页核心的现代感微调，方便查看效果 */
        body { background: #f4f7f6; color: #1a2b25; font-family: system-ui, sans-serif; }
        .container { max-width: 520px; margin: 40px auto; padding: 0 16px; }

        /* 悬浮岛导航栏 */
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            margin-bottom: 24px;
            font-weight: 600;
        }
        .nav-auth a { color: #2d7a5f; text-decoration: none; margin-left: 12px; font-size: 14px; }

        /* 胶囊一体化搜索框 */
        .search-container { position: relative; margin-bottom: 24px; }
        .search-form {
            display: flex;
            background: white;
            padding: 6px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }
        .search-form input {
            flex: 1;
            border: none;
            outline: none;
            padding: 0 16px;
            font-size: 15px;
            background: transparent;
        }
        .search-form button {
            background: #2d7a5f;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
        }

        /* 联想面板高级样式 */
        .suggest-panel {
            display: none;
            position: absolute;
            top: 60px; left: 0; right: 0;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            z-index: 999;
            overflow: hidden;
        }
        .suggest-item {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid #f8fafc;
            display: flex;
            justify-content: space-between;
        }
        .suggest-item .tag { font-size: 12px; color: #70857d; background: #eef3f1; padding: 2px 8px; border-radius: 10px; }

        /* 现代大卡片流 */
        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .card-header { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .desc {
            max-height: 0;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 14px;
            color: #70857d;
            line-height: 1.6;
        }
        .card:hover { transform: translateY(-2px); box-shadow: 0 12px 20px rgba(46, 122, 95, 0.08); }
        .card:hover .desc { max-height: 80px; opacity: 1; margin-top: 12px; }

    </style>
</head>
<div class="bg-emoji"></div>
<body>

<div class="container">

    <div class="nav">
        <div>♻️ 垃圾分类系统</div>
        <div class="nav-auth">
            {% if user_id %}
                <a href="/me">👤 我的</a>
                <a href="/logout">🚪 退出</a>
            {% else %}
                <a href="/login">🔐 登录 / 注册</a>
            {% endif %}
        </div>
    </div>

    <div class="search-container">
        <form action="/search" method="get" class="search-form" autocomplete="off">
            <input id="searchInput" name="keyword" placeholder="输入垃圾名称，如：电池、苹果皮...">
            <button type="submit">搜索</button>
        </form>

        <div id="suggestBox" class="suggest-panel"></div>
    </div>

    <div class="card" onclick="location.href='/ai'">
        <div class="card-header">📸 AI 智能识别</div>
        <div class="desc">上传或拍照识别垃圾类型，一键匹配数据库分类。</div>
    </div>

    <div class="card" onclick="location.href='/info'">
        <div class="card-header">📚 垃圾分类资讯</div>
        <div class="desc">查看官方最新垃圾分类政策与环保冷知识。</div>
    </div>

    <div class="card" onclick="location.href='/quiz'">
        <div class="card-header">🎮 趣味答题游戏</div>
        <div class="desc">通过随机题目练习垃圾分类，获取绿色积分奖励。</div>
    </div>

</div>

<script>
    const searchInput = document.getElementById('searchInput');
    const suggestBox = document.getElementById('suggestBox');

    searchInput.addEventListener('input', function() {
        const keyword = this.value.trim();
        if (!keyword) { predictHide(); return; }

        // 请求你后端的 /suggest 路由
        fetch(`/suggest?keyword=${encodeURIComponent(keyword)}`)
            .then(res => res.json())
            .then(data => {
                if (data.length > 0) {
                    suggestBox.innerHTML = '';
                    data.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'suggest-item';
                        div.innerHTML = `<span>✨ ${item.name}</span><span class="tag">${item.category}</span>`;

                        div.addEventListener('click', () => {
                            searchInput.value = item.name;
                            predictHide();
                            searchInput.form.submit();
                        });
                        suggestBox.appendChild(div);
                    });
                    suggestBox.style.display = 'block';
                } else { predictHide(); }
            });
    });

    function predictHide() { suggestBox.style.display = 'none'; }
    document.addEventListener('click', (e) => {
        if (e.target !== searchInput) predictHide();
    });
</script>

</body>
</html>
